id: code-review-internal
name: Code Review Internal
description: 公司内部代码风格审查清单，涵盖 Go 规范、React 规范和安全审查要点
content: |
  # Code Review Internal Skill

  RDev 内部代码审查清单，确保代码质量和一致性。

  ## Go 代码审查规范

  ### 错误处理
  - [ ] 所有错误都被处理（不使用 `_` 忽略 error）
  - [ ] 错误信息使用 `fmt.Errorf("context: %w", err)` 包装
  - [ ] 在 API 边界处记录错误日志，内部函数只传递

  ### 代码风格
  - [ ] 遵循 `gofmt` 格式化
  - [ ] 函数/方法单一职责，不超过 50 行
  - [ ] 变量命名清晰，避免单字母（循环变量除外）
  - [ ] 接口定义在使用方，不在实现方
  - [ ] 避免 init() 副作用，优先构造函数

  ### 并发安全
  - [ ] 共享状态有互斥锁保护
  - [ ] goroutine 有退出机制（context 或 channel）
  - [ ] 不在 goroutine 中捕获循环变量

  ### 数据库
  - [ ] SQL 查询使用参数占位符（防 SQL 注入）
  - [ ] 事务有回滚处理
  - [ ] 查询结果有 rows.Close() 处理

  ## React/前端代码审查规范

  ### 组件设计
  - [ ] 组件单一职责，props 类型有 TypeScript 定义
  - [ ] 使用 shadcn/ui 组件，不重复造轮子
  - [ ] 避免 prop drilling，合理使用 Context

  ### 性能
  - [ ] 列表使用唯一 key，不使用 index 作为 key（动态列表）
  - [ ] 大型计算使用 useMemo/useCallback
  - [ ] 避免在渲染函数中创建新对象/函数

  ### 可访问性
  - [ ] 交互元素有 aria-label 或可见文本
  - [ ] 颜色对比度符合 WCAG AA 标准

  ## 安全审查要点

  - [ ] 用户输入在服务端验证，不信任客户端数据
  - [ ] API 端点有认证/授权检查
  - [ ] 敏感信息不出现在日志中
  - [ ] 文件上传有类型和大小限制
  - [ ] CORS 配置只允许可信来源
  - [ ] 依赖库无已知高危 CVE

  ## 架构审查

  - [ ] 无循环依赖
  - [ ] 新功能有对应测试（单元 + 集成）
  - [ ] 公共 API 有文档注释
  - [ ] 破坏性变更有迁移计划
