id: gitea-pr-helper
name: Gitea PR Helper
description: 通过 rdev/vcs Provider 快速创建和管理 Gitea Pull Request 的工作流 skill
content: |
  # Gitea PR Helper Skill

  本 skill 提供通过 rdev/vcs 包操作 Gitea PR 的标准化工作流。

  ## 创建 PR

  ### 准备工作
  1. 确认当前分支已推送到远程
  2. 获取当前分支与目标分支的 diff：
     ```
     git diff <base-branch>...<current-branch> --stat
     ```
  3. 检查所有测试通过：`go test ./...` 或项目对应命令

  ### 写 PR 描述
  PR 描述应包含：
  - **变更摘要**（1-3 个要点）
  - **测试计划**（测试了什么，如何验证）
  - **相关 issue** 链接（格式：`Closes #<number>`）
  - **截图/录屏**（UI 变更时必须提供）

  ### 调用 CreatePR
  通过 rdev/vcs Provider 创建 PR：
  ```go
  pr, err := vcsProvider.CreatePR(ctx, vcs.CreatePRRequest{
      Title:       "<title>",
      Body:        "<description>",
      Head:        "<feature-branch>",
      Base:        "main",
      Draft:       false,
  })
  ```

  ## 更新 PR

  - 追加评论：使用 `vcsProvider.AddPRComment(ctx, prID, comment)`
  - 更新描述：使用 `vcsProvider.UpdatePR(ctx, prID, updates)`
  - 请求 review：使用 `vcsProvider.RequestReview(ctx, prID, reviewers)`

  ## 合并 PR

  满足以下条件后合并：
  - [ ] 所有 CI 检查通过
  - [ ] 至少一个 approve
  - [ ] 没有未解决的评论
  - [ ] 分支与 base 同步（无冲突）

  ## 注意事项
  - 使用 squash merge 保持 main 分支历史整洁
  - 合并后删除功能分支
  - 在对应 issue 上更新状态
