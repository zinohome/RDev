id: archon-workflow
name: Archon Workflow
description: 把 Archon（coleam00/Archon）作为 skill 调用的说明，agent 可以调用执行 Issue→PR 标准工作流
content: |
  # Archon Workflow Skill

  当用户要求执行 Archon workflow 或创建 PR 时：

  ## 使用场景
  - 将 Issue 需求转化为 Pull Request
  - 执行标准的代码审查→修复→合并流程

  ## 执行步骤

  1. **分析当前 Issue 的需求**
     - 阅读 Issue 描述和所有评论
     - 明确验收条件和技术边界

  2. **与 Archon API 交互**
     - 调用 Archon 的任务分解接口
     - 生成执行计划和子任务列表

  3. **创建 PR**
     - 按计划实现代码变更
     - 编写 PR 描述（包含 Issue 引用、变更摘要、测试计划）
     - 调用 rdev/vcs Provider 提交 PR

  4. **验证**
     - 检查 CI 状态
     - 确认 PR 链接到原 Issue

  ## 注意事项
  - 始终使用 rdev/vcs Provider，不直接调用 gh CLI
  - PR 标题遵循 Conventional Commits 规范
  - 所有变更必须有对应测试
