worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;

    # 上传文件大小限制
    client_max_body_size 100m;

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    upstream rdev_backend {
        server rdev-server:8080;
        keepalive 32;
    }

    upstream rdev_frontend {
        server rdev-frontend:3000;
        keepalive 16;
    }

    upstream rdev_gateway {
        server rdev-gateway:8090;
        keepalive 16;
    }

    server {
        listen 80;
        server_name _;

        # 健康检查（供负载均衡器使用）
        location = /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # ─── 模型网关：/v1/* → rdev-gateway ────────
        location /v1/ {
            proxy_pass http://rdev_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # 流式响应（SSE）支持
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # ─── 后端 API：/api/* → rdev-server ─────────
        location /api/ {
            proxy_pass http://rdev_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Webhook / SSE 支持
            proxy_buffering off;
            proxy_read_timeout 300s;
        }

        # ─── WebSocket 升级：/ws/* ─────────────────
        location /ws/ {
            proxy_pass http://rdev_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
        }

        # ─── 前端：所有其他请求 → rdev-frontend ──────
        location / {
            proxy_pass http://rdev_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Next.js HMR WebSocket（开发模式）
            proxy_read_timeout 300s;
        }
    }
}
