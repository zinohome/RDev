# RDev Nginx 配置
# 职责：
#   - 前端静态资源服务（/_next/static、/public 资产）
#   - API 反向代理（/api → rdev-server:8080）
#   - WebSocket 代理（/ws → rdev-server:8080）
#   - 模型网关代理（/v1 → rdev-gateway:8090）
#   - 其余请求转发至 Next.js 节点服务（rdev-frontend:3000）

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 50m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # ─── 上游服务 ─────────────────────────────────────────────────
    upstream rdev_server {
        server rdev-server:8080;
        keepalive 32;
    }

    upstream rdev_frontend {
        server rdev-frontend:3000;
        keepalive 16;
    }

    upstream rdev_gateway {
        server rdev-gateway:8090;
        keepalive 16;
    }

    server {
        listen 80;
        server_name _;

        # 安全头
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-XSS-Protection "1; mode=block" always;

        # ─── Next.js 静态资源（直接从 rdev-frontend 获取，含长缓存）
        location /_next/static/ {
            proxy_pass http://rdev_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 静态资源永久缓存（Next.js 内容哈希确保缓存安全）
            expires 365d;
            add_header Cache-Control "public, immutable";
        }

        # ─── 公共静态资源 ─────────────────────────────────────────
        location /favicon.ico {
            proxy_pass http://rdev_frontend;
            proxy_set_header Host $host;
            expires 7d;
        }

        # ─── 模型网关（/v1 → rdev-gateway）─────────────────────
        location /v1/ {
            proxy_pass http://rdev_gateway/v1/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 模型 API 响应可能较慢
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;

            # 流式输出不缓冲
            proxy_buffering off;
            proxy_cache off;
        }

        # ─── WebSocket（/ws → rdev-server）──────────────────────
        location /ws {
            proxy_pass http://rdev_server;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
        }

        # ─── API（/api → rdev-server）────────────────────────────
        location /api/ {
            proxy_pass http://rdev_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # SSE 流式响应需关闭缓冲
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
        }

        # ─── Auth（/auth → rdev-server）─────────────────────────
        location /auth/ {
            proxy_pass http://rdev_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # ─── 健康检查 ────────────────────────────────────────────
        location /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # ─── 其余请求 → Next.js 前端 ─────────────────────────────
        location / {
            proxy_pass http://rdev_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Next.js 页面不缓存
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }
}
