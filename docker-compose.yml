name: rdev

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: rdev
      POSTGRES_USER: ${POSTGRES_USER:-rdev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rdev}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  gateway:
    build:
      context: .
      dockerfile: deploy/Dockerfile.gateway
    environment:
      PORT: "8090"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OLLAMA_URL: ${OLLAMA_URL:-http://localhost:11434}
    ports:
      - "127.0.0.1:8090:8090"

volumes:
  pgdata:
